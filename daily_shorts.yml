name: 6x Daily Shorts Factory

on:
  schedule:
    - cron: '0 */4 * * *' # Wakes up every 4 hours
  workflow_dispatch: # Allows you to trigger it manually from your phone

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: pip install requests moviepy gTTS google-auth-oauthlib google-api-python-client

      - name: Run Factory
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python shorts_maker.py
